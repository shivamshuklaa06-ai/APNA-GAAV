<!DOCTYPE html><html>
<head>
<title>BharatGaav Connect</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;background:#f5f5f5;margin:0}
header{background:green;color:white;text-align:center;padding:15px}
.card{background:white;padding:10px;margin:10px;border-radius:8px}
input,button{margin:5px;padding:10px;width:90%}
button{background:green;color:white;border:none}
</style>
</head><body><header>
<h2>BharatGaav Connect 🇮🇳</h2>
<p>Village Services Platform</p>
</header><section style="padding:10px"><h3>Add Your Service</h3><input id="name" placeholder="Your Name">
<input id="service" placeholder="Service (Electrician, Plumber etc)">
<input id="phone" placeholder="Phone Number">
<input id="village" placeholder="Village"><button onclick="add()">Submit</button>

<hr><h3>Services</h3>
<div id="list"></div></section><script>
let data = JSON.parse(localStorage.getItem("services")) || [];

function add(){
  let s = {
    name:name.value,
    service:service.value,
    phone:phone.value,
    village:village.value
  };

  data.push(s);
  localStorage.setItem("services", JSON.stringify(data));
  show();
}

function show(){
  list.innerHTML="";
  data.forEach(s=>{
    list.innerHTML += `<div class="card">
      <b>${s.service}</b><br>
      👤 ${s.name}<br>
      📍 ${s.village}<br>
      📞 ${s.phone}
    </div>`;
  });
}

show();
</script></body>
</html>
